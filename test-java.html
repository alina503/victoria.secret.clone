<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>test java</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              clifford: "#da373d",
              test: "red",
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="relative w-full min-h-screen bg-blue-200 justify-center flex items-center flex-col gap-5 px-4 py-8"
  >
    <div class="w-full max-w-[500px]">
      <div class="bg-purple-400 p-6">
        <h1 class="text-3xl text-white font-bold text-center">Website to do</h1>
      </div>

      <div class="bg-white pt-6 pb-12">
        <ul
          id="todoList"
          class="flex flex-col gap-4 items-center text-2xl font-semibold text-purple-500"
        >
          <!-- <li>
            <input type="checkbox" checked="true" />
            <span>Stayleguide creation</span>
            <button><i class="fa-solid fa-trash"></i></button>
          </li> -->
        </ul>

        <button
          id="openModal"
          class="bg-purple-400 text-white mb-[-70px] mt-8 block mx-auto p-4 rounded-full font-semibold text-xl"
        >
          + New task
        </button>
      </div>
    </div>

    <div id="modal" class="w-full max-w-[500px] bg-purple-400 p-4 absolute hidden">
      <div class="flex justify-end">
        <button
          id="closeModal"
          class="text-black font-semibold px-8 py-3 rounded-full bg-white"
        >
          Close
        </button>
      </div>
      <div class="flex gap-3 mt-7">
        <input id="inputModal" class="flex-1" type="text" />
        <button
          id="addTodo"
          class="text-black font-semibold px-8 py-3 rounded-full bg-white"
        >
          Add
        </button>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
